<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}SrvCheck{% endblock %}</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/htmx.org@2.0.4"></script></head>
<body class="min-h-screen bg-slate-100 text-slate-800">
{% if user.is_authenticated %}<nav class="bg-slate-950 text-white"><div class="mx-auto flex max-w-7xl items-center gap-6 px-5 py-4"><a href="{% url 'dashboard' %}" class="text-xl font-bold text-cyan-400">SrvCheck</a><a href="{% url 'dashboard' %}">Xray 监控</a><a href="{% url 'tcp-monitors' %}">TCP 监控</a><a href="{% url 'https-monitors' %}">HTTPS 监控</a><a href="{% url 'test-points' %}">测试点</a><a href="{% url 'settings' %}">通知设置</a><form method="post" action="{% url 'logout' %}" class="ml-auto">{% csrf_token %}<button>退出</button></form></div></nav>{% endif %}
<main class="mx-auto max-w-7xl px-5 py-8">{% for message in messages %}<div class="mb-5 rounded-lg bg-cyan-50 p-3 text-cyan-800">{{ message }}</div>{% endfor %}{% block content %}{% endblock %}</main></body></html>
