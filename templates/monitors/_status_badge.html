{% if object.status == 'up' %}<span class="inline-flex items-center gap-1.5 rounded-full border border-emerald-300 bg-emerald-100 px-3 py-1 text-sm font-bold text-emerald-800 shadow-sm"><span aria-hidden="true">●</span> 正常</span>
{% elif object.status == 'down' %}<span class="inline-flex animate-pulse items-center gap-1.5 rounded-full border border-red-400 bg-red-100 px-3 py-1 text-sm font-bold text-red-800 shadow-sm"><span aria-hidden="true">⚠</span> 异常</span>
{% elif object.status == 'disabled' %}<span class="inline-flex items-center gap-1.5 rounded-full border border-slate-300 bg-slate-200 px-3 py-1 text-sm font-semibold text-slate-700"><span aria-hidden="true">⏸</span> 停用</span>
{% else %}<span class="inline-flex items-center gap-1.5 rounded-full border border-amber-300 bg-amber-100 px-3 py-1 text-sm font-bold text-amber-800"><span aria-hidden="true">?</span> 未知</span>{% endif %}
