{% for s in target.point_summaries %}<div class="truncate" title="{{ s.title }}"><span class="font-medium text-slate-700">{{ s.point.name }}</span> · {% if s.status == 'up' %}<span class="text-emerald-700">正常</span>{% elif s.status == 'down' %}<span class="text-red-700">异常</span>{% else %}<span class="text-slate-400">暂无数据</span>{% endif %}{% if s.detail %} · <span class="font-mono">{{ s.detail }}</span>{% endif %}{% if s.speed_text %} · <span class="text-violet-700">⚡{{ s.speed_text }}</span>{% endif %}</div>{% empty %}<div class="text-slate-400">未配置测试点</div>{% endfor %}
