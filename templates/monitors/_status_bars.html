<div class="order-last w-full basis-full overflow-x-auto border-t border-slate-200 px-1 pb-1 pt-3 lg:order-none lg:w-auto lg:min-w-0 lg:basis-0 lg:flex-1 lg:border-0 lg:pt-0 lg:overflow-x-visible">
  <div class="flex min-w-max items-end gap-px xl:gap-1" aria-label="各测试点状态历史">
  {% for bar in target.status_bars %}
    <div class="flex w-2 flex-col gap-px xl:w-3 {% if bar.kind == 'hourly' and forloop.counter == 8 %}ml-3{% endif %}" aria-label="{{ bar.label }}">
    {% for segment in bar.segments %}
      <div class="h-2 rounded-[1px] {{ segment.css_class }}" title="{{ segment.title }}"></div>
    {% empty %}<div class="h-2 rounded-[1px] bg-slate-300" title="未配置测试点"></div>{% endfor %}
    </div>
  {% endfor %}
  </div>
  {% if show_ip_info %}
  <div class="mt-1 flex items-start gap-1.5 text-xs leading-4 text-slate-500" title="出口 IP {{ target.exit_ip|default:'—' }}">
    <span class="shrink-0 rounded bg-slate-200 px-1 font-bold text-slate-700">{{ target.country_code|default:"--" }}</span>
    <span class="min-w-0 break-words">{{ target.company_name|default:"归属查询中" }}</span>
  </div>
  {% endif %}
</div>
