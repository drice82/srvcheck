{% extends "base.html" %}{% block content %}<div class="mx-auto max-w-2xl"><h1 class="mb-6 text-3xl font-bold">{{ title }}</h1><form method="post" class="space-y-5 rounded-xl bg-white p-6 shadow-sm">{% csrf_token %}{% for field in form %}<div><label class="mb-1 block font-medium">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<p class="text-sm text-red-600">{{ error }}</p>{% endfor %}{% if field.help_text %}<p class="mt-1 text-sm text-slate-500">{{ field.help_text }}</p>{% endif %}</div>{% endfor %}<button class="rounded-lg bg-cyan-600 px-5 py-2 text-white">保存</button></form></div>{% endblock %}
